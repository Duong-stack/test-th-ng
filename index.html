<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test độ thẳng 😏</title>

<style>
/* BACKGROUND */
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #ff4d6d, #6a5acd, #00c9ff);
  background-size: 300% 300%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* BOX */
.container {
  width: 90%;
  max-width: 420px;
  padding: 25px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);

  text-align: center;
  color: white;
}

/* TEXT */
h1 {
  font-size: 26px;
  margin-bottom: 20px;
}

/* GIF */
img {
  width: 100%;
  max-width: 320px;
  border-radius: 15px;
  transition: opacity 0.3s;
  margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
}

button {
  flex: 1;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

/* YES nhỏ dần */
#yesBtn {
  background: rgba(255,255,255,0.8);
  color: black;
}

/* NO to dần */
#noBtn {
  background: #ff4d6d;
  color: white;
  box-shadow: 0 5px 15px rgba(255,77,109,0.5);
}

/* Hover nhẹ */
button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">Bạn có chắc mình 100% thẳng không? 😏</h1>

  <!-- GIF đầu -->
  <img id="gif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNDRqYXpleG1hbWh6ZnlrdnYwdDQ1cWs5dmQ1a3h6ZHF3bTNiYXR3ayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/LR5GeZFCwDRcpG20PR/giphy.gif">

  <div class="buttons">
    <button id="yesBtn">Đúng 😇</button>
    <button id="noBtn">Không 😏</button>
  </div>
</div>

<!-- CHỈ SOUND NO -->
<audio id="noSound" src="no.mp3"></audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const gif = document.getElementById("gif");
const question = document.getElementById("question");
const noSound = document.getElementById("noSound");

let count = 0;

// YES
yesBtn.onclick = () => {
  count++;

  let scale = 1 - count * 0.1;
  yesBtn.style.transform = `scale(${scale})`;

  let grow = 1 + count * 0.2;
  noBtn.style.transform = `scale(${grow})`;

  question.innerText = "Suy nghĩ kỹ lại đi 😏";

  if (scale <= 0.3) {
    yesBtn.style.display = "none";
  }
};

// NO
noBtn.onclick = () => {
  noSound.currentTime = 0;
  noSound.play();

  gif.style.opacity = 0;

  setTimeout(() => {
    gif.src = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcmtodGd3b253cTVmcXRsbXNtOTZ5enRzemEwemFoMWg5aTU0eDN5eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0tONCfOdU9SW4YTtCk/giphy.gif";
    gif.style.opacity = 1;
  }, 200);

  question.innerText = "Biết ngay mà 😏";

  yesBtn.style.display = "none";
  noBtn.style.display = "none";
};
</script>

</body>
</html>
